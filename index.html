<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#0EA5E9"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Bizflow"/>
<title>Bizflow</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%}
body{font-family:'Noto Sans JP',sans-serif;background:#EFF9FA;color:#1E293B;-webkit-font-smoothing:antialiased;overflow-x:hidden}
:root{
  --sky:#0EA5E9;--sky-d:#0284C7;--sky-l:#E0F2FE;
  --teal:#14B8A6;--em:#10B981;--em-l:#D1FAE5;
  --bg:#EFF9FA;--card:#fff;--border:#E2EFF5;
  --sub:#64748B;--muted:#94A3B8;
  --grad:linear-gradient(135deg,#0EA5E9 0%,#06B6D4 45%,#10B981 100%);
  --nav-h:56px;
}
/* NAV */
.top-nav{position:fixed;top:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;z-index:100;background:var(--grad);}
.top-nav::before{content:'';display:block;height:env(safe-area-inset-top);}
.nav-tabs{display:flex;height:var(--nav-h);}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;border:none;background:none;cursor:pointer;color:rgba(255,255,255,.55);padding:4px 0;position:relative;}
.nav-btn svg{width:20px;height:20px;stroke-width:1.8;}
.nav-btn span{font-size:9px;font-weight:700;}
.nav-btn.active{color:#fff;}
.nav-btn.active::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:24px;height:3px;background:#fff;border-radius:2px 2px 0 0;}
/* SCREEN */
.screen{padding-top:calc(var(--nav-h) + env(safe-area-inset-top));padding-bottom:calc(env(safe-area-inset-bottom) + 16px);min-height:100dvh;}
/* HEADER */
.ph{background:var(--grad);padding:14px 16px 18px;position:relative;overflow:hidden;}
.ph::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:20px;background:var(--bg);clip-path:ellipse(55% 100% at 50% 100%);}
.ph .ey{font-size:11px;color:rgba(255,255,255,.7);font-weight:600;letter-spacing:.06em;}
.ph h1{font-size:20px;font-weight:800;color:#fff;margin-top:2px;}
.ph .sb{font-size:12px;color:rgba(255,255,255,.6);margin-top:1px;}
.ph-row{display:flex;align-items:flex-start;justify-content:space-between;}
.deco{position:absolute;top:-20px;right:-20px;width:110px;height:110px;background:rgba(255,255,255,.07);border-radius:50%;}
.deco2{position:absolute;top:20px;right:20px;width:55px;height:55px;background:rgba(255,255,255,.05);border-radius:50%;}
/* RELOAD BTN */
/* CARD */
.card{background:var(--card);border-radius:18px;border:1px solid var(--border);padding:14px;box-shadow:0 2px 10px rgba(14,165,233,.05);margin-bottom:8px;}
.card.tap{cursor:pointer;transition:transform .1s;}
.card.tap:active{transform:scale(.985);}
/* STAT GRID */
.sg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.sc{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:14px;box-shadow:0 2px 8px rgba(14,165,233,.05);}
.sc .l{font-size:11px;color:var(--sub);font-weight:600;margin-bottom:4px;}
.sc .v{font-size:26px;font-weight:800;line-height:1;}
.sc .u{font-size:11px;color:var(--muted);margin-top:2px;}
/* BADGE */
.badge{display:inline-flex;align-items:center;font-size:11px;font-weight:700;padding:3px 9px;border-radius:100px;}
.bg-green{background:#D1FAE5;color:#065F46;}.bg-sky{background:#E0F2FE;color:#0369A1;}
.bg-amber{background:#FEF3C7;color:#92400E;}.bg-gray{background:#F1F5F9;color:#64748B;}
.bg-red{background:#FEE2E2;color:#991B1B;}.bg-purple{background:#EDE9FE;color:#5B21B6;}
/* PILL */
.pills{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px;scrollbar-width:none;}
.pills::-webkit-scrollbar{display:none;}
.pill{flex-shrink:0;padding:7px 14px;border-radius:100px;font-size:12px;font-weight:700;border:none;cursor:pointer;background:#F1F5F9;color:var(--sub);font-family:inherit;}
.pill.on{background:var(--sky);color:#fff;}
/* SECTION LABEL */
.sl{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin:18px 0 10px;}
/* AVATAR */
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;flex-shrink:0;}
/* MODAL */
.backdrop{position:fixed;inset:0;background:rgba(15,30,50,.45);z-index:200;display:flex;flex-direction:column;justify-content:flex-end;}
.sheet{background:#fff;border-radius:24px 24px 0 0;max-height:92dvh;overflow-y:auto;}
.sh-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:10px auto 0;}
.sh-head{position:sticky;top:0;background:#fff;padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;z-index:1;}
.sh-head h2{font-size:15px;font-weight:800;}
.sh-close{width:28px;height:28px;border-radius:50%;border:none;background:#F1F5F9;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--sub);}
.sh-body{padding:14px 16px 24px;}
/* FORM */
.field{margin-bottom:12px;}
.field label{display:block;font-size:11px;font-weight:700;color:var(--sub);margin-bottom:4px;letter-spacing:.04em;}
.field input,.field select,.field textarea{width:100%;border:1.5px solid var(--border);border-radius:12px;padding:11px 13px;font-size:14px;font-family:inherit;background:#FAFEFF;color:var(--txt);outline:none;transition:border .15s;}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--sky);}
.field textarea{resize:none;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.ng{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px;}
.nc{text-align:center;}
.nc label{display:block;font-size:11px;font-weight:700;color:var(--sub);margin-bottom:3px;}
.nc input{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:10px 4px;text-align:center;font-size:16px;font-weight:700;color:var(--sky);background:#FAFEFF;outline:none;font-family:inherit;}
/* TOGGLE */
.tog{display:flex;border:1.5px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:12px;}
.tog button{flex:1;padding:10px;font-size:12px;font-weight:700;font-family:inherit;border:none;background:#fff;color:var(--sub);cursor:pointer;}
.tog button.on{background:var(--sky);color:#fff;}
/* BUTTON */
.btn{display:inline-flex;align-items:center;gap:6px;padding:11px 18px;border-radius:12px;font-size:13px;font-weight:700;font-family:inherit;border:none;cursor:pointer;}
.btn-p{background:var(--sky);color:#fff;}
.btn-g{background:var(--em);color:#fff;}
.btn-r{background:#FEE2E2;color:#DC2626;}
.btn-f{width:100%;justify-content:center;padding:14px;}
.btn:disabled{opacity:.35;pointer-events:none;}
/* FAB */
.fab{position:fixed;bottom:calc(18px + env(safe-area-inset-bottom));right:calc(50% - min(215px,50vw) + 14px);width:54px;height:54px;border-radius:50%;background:var(--sky);color:#fff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 20px rgba(14,165,233,.45);z-index:90;}
.fab svg{width:24px;height:24px;stroke-width:2.4;}
.fab:active{transform:scale(.92);}
/* CALENDAR */
.wh{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:3px;}
.wh span{text-align:center;font-size:11px;font-weight:700;padding:3px 0;color:var(--muted);}
.wh span.sun{color:#F43F5E;}.wh span.sat{color:#0EA5E9;}
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--border);border-radius:14px;overflow:hidden;}
.cd{background:#fff;min-height:48px;display:flex;flex-direction:column;align-items:center;padding:5px 2px 3px;cursor:pointer;}
.cd:hover{background:#F0FAFA;}
.cd.sel{outline:2px solid var(--sky);outline-offset:-2px;z-index:1;}
.cd.regsel{background:#E0F2FE;outline:2px solid var(--sky);outline-offset:-2px;z-index:1;}
.dn{font-size:12px;font-weight:700;width:22px;height:22px;display:flex;align-items:center;justify-content:center;border-radius:50%;margin-bottom:2px;}
.dn.today{background:var(--sky);color:#fff;}
.dn.sun{color:#F43F5E;}.dn.sat{color:#0EA5E9;}
.bars{display:flex;flex-direction:column;gap:2px;width:100%;padding:0 3px;}
.bar{height:3px;border-radius:2px;width:100%;}
/* SHIFT BAR */
.sbar{border-radius:12px;padding:10px 13px;display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
/* INFO TABLE */
.itbl{background:#F8FDFE;border-radius:13px;padding:12px;margin-bottom:12px;}
.ir{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border);}
.ir:last-child{border-bottom:none;}
.ir .k{font-size:12px;color:var(--sub);font-weight:600;}
.ir .v{font-size:13px;color:var(--txt);font-weight:700;text-align:right;max-width:60%;}
/* TOAST */
.toast{position:fixed;bottom:calc(var(--nav-h) + 14px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);background:#1E293B;color:#fff;font-size:13px;font-weight:600;padding:10px 20px;border-radius:100px;box-shadow:0 4px 20px rgba(0,0,0,.2);display:flex;align-items:center;gap:8px;white-space:nowrap;z-index:300;}
/* RECEIPT */
.ru{border:2px dashed var(--border);border-radius:13px;padding:20px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;cursor:pointer;width:100%;}
.ru:hover{border-color:var(--sky);background:#F0FBFF;}
.rp{position:relative;border-radius:13px;overflow:hidden;border:1px solid var(--border);}
.rp img{width:100%;height:140px;object-fit:cover;display:block;}
.ro{position:absolute;bottom:0;inset-x:0;background:rgba(15,30,50,.65);padding:8px 12px;display:flex;align-items:center;justify-content:space-between;}
/* LOGIN */
.lw{min-height:100dvh;background:var(--grad);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 20px;}
.lcard{background:#fff;border-radius:24px;padding:22px;width:100%;max-width:360px;box-shadow:0 20px 60px rgba(0,0,0,.15);}
.lub{width:100%;display:flex;align-items:center;gap:12px;padding:11px;border-radius:13px;border:2px solid var(--border);background:#fff;cursor:pointer;text-align:left;margin-bottom:8px;font-family:inherit;}
.lub:hover,.lub.sel{border-color:var(--sky);background:#F0FBFF;}
/* STEPS */
.rcard{background:#fff;border-radius:24px;width:100%;max-width:360px;box-shadow:0 20px 60px rgba(0,0,0,.15);overflow:hidden;}
.rh{background:var(--grad);padding:18px 20px 14px;color:#fff;}
.rh .rl{font-size:11px;opacity:.7;font-weight:600;margin-bottom:3px;}
.rh h2{font-size:17px;font-weight:800;}
.rb{padding:18px 20px 22px;}
.dots{display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:28px;}
.dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.3);}
.dot.a{background:#fff;width:22px;border-radius:4px;}
.dot.d{background:rgba(255,255,255,.6);}
.color-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px;}
.copt{height:42px;border-radius:11px;border:3px solid transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.copt.sel{border-color:#1E293B;transform:scale(1.06);}
.copt span{font-size:10px;color:#fff;font-weight:800;text-shadow:0 1px 3px rgba(0,0,0,.3);}
.backbtn{background:none;border:none;color:var(--muted);font-size:13px;font-family:inherit;cursor:pointer;display:flex;align-items:center;gap:4px;padding:0;margin-bottom:14px;}
/* STORE INPUT */
.store-input-wrap{margin-bottom:14px;}
.store-row{display:flex;gap:6px;margin-bottom:6px;}
.store-row input{flex:1;min-width:0;border:1.5px solid var(--border);border-radius:10px;padding:9px 12px;font-size:13px;font-family:inherit;background:#FAFEFF;outline:none;}
.store-row button{flex-shrink:0;background:var(--sky);border:none;border-radius:10px;padding:9px 14px;color:#fff;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;}
.store-addr{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:9px 12px;font-size:13px;font-family:inherit;background:#FAFEFF;outline:none;box-sizing:border-box;}
.si{display:flex;align-items:center;gap:8px;background:#F8FDFE;border-radius:10px;padding:8px 12px;margin-bottom:6px;}
/* STAFF PILLS */
.sp-wrap{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:18px;}
.sp{padding:7px 12px;border-radius:100px;border:2px solid var(--border);background:#fff;color:var(--sub);font-size:12px;font-weight:700;font-family:inherit;cursor:pointer;transition:all .15s;}
/* WDAY */
.wday-row{display:flex;gap:3px;margin-bottom:12px;}
.wd{flex:1;padding:8px 2px;border-radius:9px;font-size:11px;font-weight:800;border:none;cursor:pointer;font-family:inherit;}
.wd.on{background:var(--sky-l);color:var(--sky);}
.wd.on.sun{background:#FEE2E2;color:#F43F5E;}
.wd.on.sat{background:#E0F2FE;color:#0284C7;}
.wd.off{background:#F1F5F9;color:var(--muted);text-decoration:line-through;}
/* RANGE PREVIEW */
.rp-box{background:var(--sky-l);border-radius:12px;padding:10px 14px;display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
/* SUM BAR */
.sum{background:var(--sky-l);border-radius:12px;padding:10px 14px;display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
/* ALERT */
.alert{border-radius:13px;padding:11px 13px;display:flex;align-items:center;gap:9px;margin-bottom:10px;}
.alert svg{width:15px;height:15px;stroke-width:2;flex-shrink:0;}
.alert-a{background:#FFFBEB;border:1px solid #FDE68A;color:#92400E;}
.alert-a svg{color:#F59E0B;}
/* TAB TOGGLE */
.tt{display:flex;border:1.5px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:12px;}
.tt button{flex:1;padding:10px;font-size:12px;font-weight:700;font-family:inherit;border:none;background:#fff;color:var(--sub);cursor:pointer;}
.tt button.on{background:var(--sky);color:#fff;}
/* PERF GRID */
.pg{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px;}
.pc{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:9px 5px;text-align:center;}
.pc .pl{font-size:10px;color:var(--sub);font-weight:700;margin-bottom:1px;}
.pc .pv{font-size:19px;font-weight:900;line-height:1;}
.pc .pu{font-size:10px;color:var(--muted);}
/* DETAIL HEADER */
.dh{display:flex;align-items:center;gap:8px;padding:12px 14px;border-bottom:1px solid var(--border);background:#fff;position:sticky;top:calc(var(--nav-h) + env(safe-area-inset-top));z-index:10;}
.dh h2{font-size:15px;font-weight:800;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.back-btn{width:32px;height:32px;border-radius:50%;border:none;background:var(--sky-l);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--sky);flex-shrink:0;}
/* OTHER ITEM ROW */
.oi{display:flex;gap:7px;align-items:center;margin-bottom:8px;}
.oi input:first-child{flex:1;min-width:0;border:1.5px solid var(--border);border-radius:10px;padding:9px 11px;font-size:13px;font-family:inherit;background:#FAFEFF;outline:none;}
.oi input:nth-child(2){width:60px;border:1.5px solid var(--border);border-radius:10px;padding:9px 6px;text-align:center;font-size:13px;font-family:inherit;background:#FAFEFF;outline:none;}
/* CONTENT PAD */
.cp{padding:0 14px;}
</style>
</head>

<div id="app"></div>
<script>
// ══ CONFIG ═══════════════════════════════════════════════════
const GAS_URL = "https://script.google.com/macros/s/AKfycbydzgIQT9bC-AQuN0TzuoU39TKl5bvusPInmn6aUtknrhKOSVsgwpWTaKRz9GpuGRc6Tw/exec";

// ══ COLORS ════════════════════════════════════════════════════
const COLORS = [

  {id:"P002",name:"SB新宿 MNP強化月間",         clientId:"C002",start:"2026-06-15",end:"2026-07-15",price:120000,status:"稼働中",assignedUsers:"suzuki@example.com"},

let shifts = [];

const EXP_CATS = ["交通費","接待費","備品・消耗品","通信費","研修・セミナー","その他"];

const TYPE_COLORS = {勤務:null,内勤:"#A78BFA",商談:"#34D399",外回り:"#FBBF24",公休:"#CBD5E1"};

// ══ UTILS ══════════════════════════════════════════════════════
const today = () => { const d=new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); };
const fmt = n => (+n||0).toLocaleString("ja-JP");
const ymd = (y,m,d) => `${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
const fmtDate = s => {
  if(!s) return "";
  const str = String(s);
  if(str.includes("T")){ const d=new Date(str); const j=new Date(d.getTime()+9*3600000); return j.getUTCFullYear()+"-"+String(j.getUTCMonth()+1).padStart(2,"0")+"-"+String(j.getUTCDate()).padStart(2,"0"); }
  return str.slice(0,10);
};
const toDateVal = s => fmtDate(s);
const statusBadge = s => {
  const m={稼働中:"bg-green",商談中:"bg-amber",契約済:"bg-sky",終了:"bg-gray",承認:"bg-green",申請中:"bg-amber",差戻し:"bg-red"};
  return `<span class="badge ${m[s]||'bg-gray'}">${s}</span>`;
};

// ══ SVG ICONS (純粋関数) ═══════════════════════════════════════

let toastTimer = null;
function showToast(msg) {
  document.querySelectorAll(".toast").forEach(e=>e.remove());
  const t = document.createElement("div");
  t.className = "toast";
  t.innerHTML = ICO.check + msg;
  document.getElementById("app").appendChild(t);
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.remove(), 2800);
}

let activeModal = null;
function openModal(html, onOpen) {
  closeModal();
  const bd = document.createElement("div");
  bd.className = "backdrop";
  bd.innerHTML = `<div class="sheet"><div class="sh-handle"></div>${html}</div>`;
  bd.addEventListener("click", e => { if(e.target===bd) closeModal(); });
  document.getElementById("app").appendChild(bd);
  activeModal = bd;
  if(onOpen) onOpen(bd);
}
function closeModal() {
  if(activeModal) { activeModal.remove(); activeModal = null; }
}

// ══ GAS ════════════════════════════════════════════════════════
async function gasPost(action, data) {
  if(GAS_URL.startsWith("★")) return {success:true};
  try {
    const res = await fetch(GAS_URL, {method:"POST", body:JSON.stringify({action,data})});
    return await res.json();
  } catch(e) { console.warn("GAS POST:", e); return {error:e.message}; }
}



async function loadAll() {
  if(GAS_URL.startsWith("★")) return false;
  try {
    const res = await fetch(GAS_URL + "?action=getAll&t=" + Date.now());
    const d = await res.json();
    if(d.error) return false;
    if(Array.isArray(d.users))    USERS    = d.users;
    if(Array.isArray(d.clients))  clients  = d.clients;
    if(Array.isArray(d.projects)) projects = d.projects;
    if(Array.isArray(d.stores))   STORES   = d.stores;
    if(Array.isArray(d.shifts))   shifts   = d.shifts;
    if(Array.isArray(d.reports))  reports  = d.reports.map(normalizeReport);
    if(Array.isArray(d.expenses)) expenses = d.expenses;
    return true;
  } catch(e) { console.warn(e); return false; }
}

function normalizeReport(r) {
  let others = [];
  try { others = typeof r.others==="string" ? JSON.parse(r.others||"[]") : (r.others||[]); } catch(e){}
  return {...r, new_:+r.new_||0, mnp:+r.mnp||0, bb:+r.bb||0, elec:+r.elec||0, card:+r.card||0, uc:+r.uc||0, others, acc:+r.acc||0};
}

function av(user, size=36) {
  const c = gc(user.color||"sky");
  return `<div class="av" style="width:${size}px;height:${size}px;background:${c.light};color:${c.text};font-size:${Math.floor(size*.38)}px">${user.name[0]}</div>`;
}

// ══ RENDER ═════════════════════════════════════════════════════
function render() {
  if(!CU) { renderLogin(); return; }
  const isAdmin = CU.role==="Admin";
  if(!TAB) TAB = isAdmin ? "dashboard" : "home";

  const adminTabs = [
    {id:"dashboard",label:"ダッシュ",icon:ICO.chart},
    {id:"projects", label:"案件",    icon:ICO.brief},
    {id:"shifts",   label:"シフト",  icon:ICO.cal},
    {id:"reports",  label:"日報",    icon:ICO.doc},
    {id:"expenses", label:"経費",    icon:ICO.rcpt},
  ];
  const empTabs = [
    {id:"home",     label:"ホーム",  icon:ICO.home},
    {id:"projects", label:"案件",    icon:ICO.brief},
    {id:"reports",  label:"日報",    icon:ICO.doc},
    {id:"expenses", label:"経費",    icon:ICO.rcpt},
  ];
  const tabs = isAdmin ? adminTabs : empTabs;

  const nav = `<nav class="top-nav"><div class="nav-tabs">${
    tabs.map(t => {
      const active = (!DETAIL_PROJ && TAB===t.id) ? " active" : "";
      return `<button class="nav-btn${active}" data-tabid="${t.id}" onclick="goTab(this.dataset.tabid)">${t.icon}<span>${t.label}</span></button>`;
    }).join("")
  }</div></nav>`;

  let screen = "";
  if(DETAIL_PROJ) screen = renderProjDetail();
  else if(TAB==="dashboard") screen = renderDash();
  else if(TAB==="home")      screen = renderHome();
  else if(TAB==="projects")  screen = renderProjects();
  else if(TAB==="shifts")    screen = renderShifts();
  else if(TAB==="reports")   screen = renderReports();
  else if(TAB==="expenses")  screen = renderExpenses();

  document.getElementById("app").innerHTML = `${nav}<div class="screen">${screen}</div>`;
}

function goTab(id) { DETAIL_PROJ=null; TAB=id; render(); }

function setSfType(t) {
  sfType = t;
  document.querySelectorAll(".sf-type-btn").forEach(b=>{
    const sel = b.dataset.t === t;
    b.style.borderColor = sel?"var(--sky)":"var(--border)";
    b.style.background  = sel?"var(--sky)":"#fff";
    b.style.color       = sel?"#fff":"var(--sub)";
  });
  const isWork = t==="勤務";
  const hasProj = t==="商談"||t==="外回り";
  const ew = document.getElementById("sf-excl-wrap");
  const pw = document.getElementById("sf-proj-wrap");
  const lbl = document.getElementById("sf-proj-label");
  if(ew) ew.style.display = (t==="公休")?"none":"";
  if(pw) pw.style.display = (t==="公休"||t==="内勤")?"none":"";
  if(lbl) lbl.textContent = isWork?"案件 *":"案件（任意）";
  updateSfPreview([...calSelDates].length);
}

function toggleWd(i) {
  const btn = document.getElementById("wd"+i);
  if(sfExcl.includes(i)){ sfExcl=sfExcl.filter(d=>d!==i); if(btn) btn.classList.remove("off"); }
  else { sfExcl.push(i); if(btn) btn.classList.add("off"); }
  updateSfPreview([...calSelDates].length);
}

function sfProjChange() {
  const pid = document.getElementById("sf-proj")?.value;
  const sts = STORES.filter(s=>s.projId===pid);
  const sel = document.getElementById("sf-store");
  if(sel) sel.innerHTML = `<option value="">選択してください</option>${sts.map(s=>`<option value="${s.id}">${s.name}</option>`).join("")}`;
}

function updateSfPreview(total) {
  const cnt = document.getElementById("sf-cnt");
  const box = document.getElementById("sf-preview");
  const sorted = [...calSelDates].sort();
  let n = sorted.filter(ds=>!sfExcl.includes(new Date(ds).getDay())).length;
  if(cnt) cnt.textContent = n;
  if(box) box.style.display = n>0?"flex":"none";
}

function saveDatesShift() {
  const uid = document.getElementById("sf-uid")?.value;
  if(!uid) { showToast("スタッフを選択してください"); return; }
  const projId = (sfType==="公休"||sfType==="内勤") ? "" : (document.getElementById("sf-proj")?.value||"");
  const storeId = sfType==="勤務" ? (document.getElementById("sf-store")?.value||"") : "";
  if(sfType==="勤務"&&!storeId) { showToast("案件と店舗を選択してください"); return; }

  const newShifts = [];
  [...calSelDates].sort().forEach(ds=>{
    if(sfExcl.includes(new Date(ds).getDay())) return;
    if(!shifts.some(s=>s.date===ds&&s.uid===uid&&s.type===sfType)) {
      newShifts.push({id:"SH"+Date.now()+"_"+Math.random().toString(36).slice(2,5),date:ds,uid,projId,storeId,type:sfType});
    }
  });

  shifts = [...shifts, ...newShifts];
  calRegMode=false; calSelDates=new Set(); sfType="勤務"; sfExcl=[];
  closeModal(); render();
  showToast(newShifts.length+" 件登録しました");

  // GAS保存（順番に・完了後リロードで確認）
  (async()=>{
    for(const s of newShifts){
      try{ await gasPost("addShift", s); }
      catch(e){ console.warn("shift save error:", e); }
    }
  })();
}

function renderExpenses(){
  const isAdmin=CU.role==="Admin";

  const filters=["全て","申請中","承認","差戻し","案件外"];
  let filt=myE;
  if(expFilter==="案件外") filt=myE.filter(e=>!e.projId);
  else if(expFilter!=="全て") filt=myE.filter(e=>e.status===expFilter);
  const total=filt.reduce((a,e)=>a+(+(e.amt||0)),0);
  const pendCnt=myE.filter(e=>e.status==="申請中").length;
  return `
  <div class="ph"><div class="deco"></div><div class="deco2"></div>
    <div class="ph-row"><div><div class="ey">経費</div><h1 style="font-size:18px">精算管理</h1></div></div>
  </div>

  <div class="cp" style="margin-top:10px">
    <div class="pills">${filters.map(f=>`<button class="pill${expFilter===f?" on":""}" data-f="${f}" onclick="expFilter=this.dataset.f;render()">${f}${f==="申請中"&&pendCnt>0?`<span style="margin-left:4px;background:#F59E0B;color:#fff;font-size:10px;border-radius:100px;padding:1px 5px">${pendCnt}</span>`:""}</button>`).join("")}</div>
    <div class="sum"><span style="font-size:12px;color:var(--sky-d);font-weight:600">${filt.length} 件</span><span style="font-size:15px;font-weight:800;color:var(--sky)">合計 ¥${fmt(total)}</span></div>
    ${filt.map(e=>{ const u=USERS.find(u=>u.email===e.uid); const p=projects.find(p=>p.id===e.projId); const c=gc(u?.color||"sky");
      return `<div class="card tap" data-id="${e.id}" onclick="openExpDetail(this.dataset.id)">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:5px">
          <div style="flex:1;min-width:0;margin-right:8px">
            <div style="display:flex;align-items:center;gap:6px;margin-bottom:2px">
              <span style="font-size:11px;color:var(--muted)">${e.date||""}</span>
              ${!e.projId?`<span class="badge bg-purple">案件外</span>`:""}
            </div>
            ${isAdmin?`<div style="font-size:12px;font-weight:700;color:${c.bg}">${u?.name||""}</div>`:""}
            <div style="font-size:14px;font-weight:700">${e.note||""}</div>
            <div style="margin-top:2px">${e.cat?`<span class="badge bg-gray">${e.cat}</span>`:""}${p?`<span style="font-size:11px;color:var(--muted);margin-left:4px">${p.name}</span>`:""}</div>
          </div>
          <div style="text-align:right;flex-shrink:0"><div style="font-size:16px;font-weight:900">¥${fmt(+(e.amt||0))}</div>${statusBadge(e.status||"申請中")}</div>
        </div>
        ${e.receiptURL?`<div style="font-size:11px;color:var(--em);margin-top:4px">${ICO.check} 領収書あり</div>`:""}
        <div style="font-size:11px;color:var(--sky);margin-top:4px">${ICO.eye} 詳細を見る</div>
      </div>`;
    }).join("")}
    ${filt.length===0?`<div style="text-align:center;padding:40px;color:var(--muted);font-size:14px">該当する経費がありません</div>`:""}
  </div>`;
}

function openExpModal(){

function epTog(isOther,btn){ epIsOther=isOther; document.querySelectorAll(".tog button").forEach(b=>b.classList.remove("on")); btn.classList.add("on"); const w=document.getElementById("ep-proj-wrap"); if(w) w.style.display=isOther?"none":""; }
function epFile(input){ const f=input.files?.[0]; if(!f) return; const r=new FileReader(); r.onload=e=>{ expReceiptData={preview:e.target.result,url:"https://drive.google.com/file/d/drive_"+Date.now()+"/view"}; const area=document.getElementById("ep-receipt-area"); if(area) area.innerHTML=`<div class="rp"><img src="${expReceiptData.preview}" style="width:100%;height:140px;object-fit:cover;display:block"/><div class="ro"><span style="color:rgba(255,255,255,.8);font-size:12px">Drive に保存済み ✓</span></div></div>`; const w=document.getElementById("ep-warn"); if(w) w.style.display="none"; }; r.readAsDataURL(f); }
function saveExp(){
  const projId=epIsOther?null:(document.getElementById("ep-proj")?.value||null);

  const uid=document.getElementById("ep-staff")?.value||CU.email;
  const ne={id:"E"+Date.now(),uid,date:document.getElementById("ep-date")?.value||today(),projId:projId||null,cat,amt:+amt,note,status:"申請中",receiptURL:expReceiptData?.url||null,receiptPreview:expReceiptData?.preview||null};
  expenses=[ne,...expenses]; gasPost("addExpense",ne);
  epIsOther=false; expReceiptData=null;
  closeModal(); render(); showToast("経費を申請しました");
}

function removeTmpStore(i){ tempStores.splice(i,1); renderTmpStores(); }
function renderTmpStores(){ const el=document.getElementById("pj-stores"); if(!el) return; if(!tempStores.length){el.innerHTML=`<div style="font-size:12px;color:var(--muted);padding:4px 0 10px">まだ店舗が追加されていません</div>`;return;} el.innerHTML=tempStores.map((s,i)=>`<div class="si"><div style="flex:1"><div style="font-size:13px;font-weight:700">${s.name}</div>${s.addr?`<div style="font-size:11px;color:var(--muted)">${s.addr}</div>`:""}</div><button type="button" onclick="removeTmpStore(${i})" style="background:none;border:none;cursor:pointer;color:#CBD5E1;font-size:16px">✕</button></div>`).join(""); }
function togUser(btn){ const email=btn.dataset.email; const bg=btn.dataset.bg; if(tempUsers.includes(email)){tempUsers=tempUsers.filter(e=>e!==email);btn.style.background="";btn.style.color="";btn.style.borderColor="";}else{tempUsers.push(email);btn.style.background=bg;btn.style.color="#fff";btn.style.borderColor=bg;} }
function saveProject(existingId){
  const name=(document.getElementById("pj-name")?.value||"").trim(); const clientId=document.getElementById("pj-client")?.value||"";
  if(!name||!clientId){showToast("案件名・取引先は必須です");return;}
  const projId=existingId||"P"+Date.now();
  const proj={id:projId,name,clientId,start:document.getElementById("pj-start")?.value||"",end:document.getElementById("pj-end")?.value||"",price:+(document.getElementById("pj-price")?.value)||0,status:document.getElementById("pj-status")?.value||"商談中",assignedUsers:tempUsers.join(",")};
  if(existingId){ projects=projects.map(p=>p.id===existingId?proj:p); if(DETAIL_PROJ?.id===existingId) DETAIL_PROJ=proj; gasPost("updateProject",proj); }
  else { projects=[...projects,proj]; gasPost("addProject",proj); }
  const ns=tempStores.map(s=>({...s,projId}));
  ns.forEach(s=>{STORES=[...STORES,s];gasPost("addStore",s);});
  tempStores=[]; tempUsers=[];
  closeModal(); render(); showToast(existingId?"案件を更新しました":"案件を追加しました");
}
function openAddClient(){ openModal(`<div class="sh-head"><h2>クライアント追加</h2><button class="sh-close" onclick="closeModal()">${ICO.x}</button></div><div class="sh-body"><div class="field"><label>会社名 *</label><input type="text" id="cl-co" placeholder="例: ドコモショップ 新橋店"></div><div class="field"><label>担当者名 *</label><input type="text" id="cl-ct" placeholder="例: 田中 太郎"></div><div class="field"><label>電話番号</label><input type="tel" id="cl-tel" placeholder="03-0000-0000"></div><div class="field"><label>メールアドレス</label><input type="email" id="cl-mail" placeholder="example@company.jp"></div><button type="button" class="btn btn-p btn-f" onclick="saveClient()">追加する</button></div>`); }
function saveClient(){ const co=document.getElementById("cl-co")?.value?.trim(); const ct=document.getElementById("cl-ct")?.value?.trim(); if(!co||!ct){showToast("会社名と担当者名は必須です");return;} const nc={id:"C"+Date.now(),company:co,contact:ct,tel:document.getElementById("cl-tel")?.value||"",mail:document.getElementById("cl-mail")?.value||""}; clients=[...clients,nc]; gasPost("addClient",nc); closeModal(); render(); showToast("クライアントを追加しました"); }

// ══ LOGIN ══════════════════════════════════════════════════════
function renderLogin(){
  if(loginStep==="register"){ renderRegister(); return; }
  if(loginStep==="demo"){ renderDemo(); return; }
  document.getElementById("app").innerHTML=`
  <div class="lw">
    <div style="text-align:center;margin-bottom:28px">
      <div style="font-size:40px;font-weight:900;color:#fff;letter-spacing:-.02em">Bizflow</div>
      <div style="font-size:13px;color:rgba(255,255,255,.7);margin-top:2px">携帯・回線販売 業務管理システム</div>
    </div>
    <div class="lcard">
      <div style="font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:12px">Googleアカウントでログイン</div>
      <div class="field"><label>メールアドレス</label><input type="email" id="le-mail" placeholder="example@gmail.com" onkeydown="if(event.key==='Enter')checkEmail()"></div>
      <div id="le-msg" style="font-size:12px;color:var(--muted);margin-bottom:10px;min-height:16px"></div>
      <button type="button" class="btn btn-p btn-f" onclick="checkEmail()">次へ</button>
      ${GAS_URL.startsWith("★")?`<button type="button" onclick="loginStep='demo';renderLogin()" style="width:100%;margin-top:8px;padding:11px;border-radius:12px;border:1.5px solid var(--border);background:#fff;color:var(--muted);font-size:13px;font-weight:600;font-family:inherit;cursor:pointer">デモモードで試す</button>`:""}
    </div>
  </div>`;
  setTimeout(()=>document.getElementById("le-mail")?.focus(),100);
}
async function checkEmail(){
  const email=(document.getElementById("le-mail")?.value||"").trim();
  if(!email||!email.includes("@")){document.getElementById("le-msg").innerHTML=`<span style="color:#F43F5E">正しいメールアドレスを入力してください</span>`;return;}
  loginEmail=email; document.getElementById("le-msg").textContent="確認中...";
  if(!GAS_URL.startsWith("★")){try{const res=await fetch(GAS_URL+"?action=getUsers");const fresh=await res.json();if(Array.isArray(fresh))USERS=fresh;}catch(e){}}
  const user=USERS.find(u=>u.email===email);
  if(user){CU=user;TAB=user.role==="Admin"?"dashboard":"home";loginStep="email";loginEmail="";render();}
  else{loginStep="register";regStep=1;regForm={name:"",color:"sky",phone:""};renderLogin();}
}
function renderRegister(){
  const steps=["基本情報","カラー選択","確認"];
  document.getElementById("app").innerHTML=`<div class="lw"><div class="dots">${steps.map((_,i)=>`<div class="dot${i+1===regStep?" a":i+1<regStep?" d":""}"></div>`).join("")}</div>
  <div class="rcard"><div class="rh"><div class="rl">STEP ${regStep} / ${steps.length} — ${steps[regStep-1]}</div><h2>${regStep===1?"アカウント作成":regStep===2?"カラーを選んで":"内容を確認"}</h2></div>
  <div class="rb">${regStep===1?renderReg1():regStep===2?renderReg2():renderReg3()}</div></div></div>`;
}
function renderReg1(){return `<button type="button" class="backbtn" onclick="loginStep='email';regStep=1;renderLogin()">← メールアドレスに戻る</button>
  <div style="background:var(--sky-l);border-radius:11px;padding:10px 13px;margin-bottom:14px;font-size:13px;color:var(--sky-d)"><strong>${loginEmail}</strong> は未登録です。</div>
  <div class="field"><label>氏名 *</label><input type="text" id="rg-name" value="${regForm.name}" placeholder="例: 田中 太郎" oninput="regForm.name=this.value"></div>
  <div class="field"><label>電話番号</label><input type="tel" id="rg-phone" value="${regForm.phone}" placeholder="090-0000-0000" oninput="regForm.phone=this.value"></div>
  <button type="button" class="btn btn-p btn-f" onclick="goReg2()">次へ → カラー選択</button>`;}
function goReg2(){const n=(document.getElementById("rg-name")?.value||"").trim();if(!n)return;regForm.name=n;regForm.phone=document.getElementById("rg-phone")?.value||"";regStep=2;renderRegister();}
function renderReg2(){return `<button type="button" class="backbtn" onclick="regStep=1;renderRegister()">← 基本情報に戻る</button>
  <p style="font-size:13px;color:var(--sub);margin-bottom:14px">カレンダーやカードに表示される色です</p>
  <div class="color-grid">${COLORS.map(col=>`<div class="copt${regForm.color===col.id?" sel":""}" style="background:${col.bg}" data-cid="${col.id}" onclick="regForm.color=this.dataset.cid;renderRegister()"><span>${col.label}</span></div>`).join("")}</div>
  <div style="display:flex;align-items:center;gap:10px;background:var(--sky-l);border-radius:13px;padding:11px 14px;margin-bottom:14px">
    ${av({name:regForm.name||"?",color:regForm.color},40)}
    <div><div style="font-size:13px;font-weight:700">${regForm.name}</div><div style="font-size:11px;color:var(--sub)">${gc(regForm.color).label}</div></div>
  </div>
  <button type="button" class="btn btn-p btn-f" onclick="regStep=3;renderRegister()">次へ → 確認</button>`;}
function renderReg3(){const c=gc(regForm.color);return `<button type="button" class="backbtn" onclick="regStep=2;renderRegister()">← カラー選択に戻る</button>
  <div style="text-align:center;margin-bottom:18px"><div class="av" style="width:60px;height:60px;background:${c.light};color:${c.text};font-size:22px;margin:0 auto 10px">${(regForm.name||"?")[0]}</div>
  <div style="font-size:18px;font-weight:800">${regForm.name}</div><div style="font-size:12px;color:var(--muted)">${loginEmail}</div></div>
  <div class="itbl" style="margin-bottom:18px">
    <div class="ir"><span class="k">氏名</span><span class="v">${regForm.name}</span></div>
    <div class="ir"><span class="k">メール</span><span class="v" style="font-size:12px">${loginEmail}</span></div>
    ${regForm.phone?`<div class="ir"><span class="k">電話</span><span class="v">${regForm.phone}</span></div>`:""}
    <div class="ir"><span class="k">権限</span><span class="v">Employee</span></div>
    <div class="ir" style="border:none"><span class="k">カラー</span><span class="v" style="display:flex;align-items:center;gap:5px"><span style="width:12px;height:12px;border-radius:50%;background:${c.bg};display:inline-block"></span>${c.label}</span></div>
  </div>
  <button type="button" class="btn btn-g btn-f" style="margin-bottom:8px" onclick="submitReg()">この内容で登録する</button>
  <p style="font-size:11px;color:var(--muted);text-align:center">登録後すぐにアプリを使い始められます</p>`;}
async function submitReg(){
  if(USERS.find(u=>u.email===loginEmail)){CU=USERS.find(u=>u.email===loginEmail);TAB="home";loginStep="email";loginEmail="";render();showToast("ログインしました");return;}
  const nu={email:loginEmail,name:regForm.name,role:"Employee",empId:"EMP"+Date.now().toString().slice(-4),color:regForm.color,phone:regForm.phone||""};
  await gasPost("addUser",nu);
  USERS=[...USERS,nu];CU=nu;TAB="home";loginStep="email";regStep=1;loginEmail="";render();showToast("アカウントを作成しました！");
}
function renderDemo(){
  document.getElementById("app").innerHTML=`<div class="lw">
    <div style="text-align:center;margin-bottom:28px"><div style="font-size:40px;font-weight:900;color:#fff">Bizflow</div><div style="font-size:13px;color:rgba(255,255,255,.7)">デモモード</div></div>
    <div class="lcard">
      <div style="font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:12px">ユーザーを選択</div>
      ${USERS.map(u=>{const c=gc(u.color);return`<button type="button" class="lub" data-email="${u.email}" onclick="demoLogin(this.dataset.email)"><div class="av" style="width:40px;height:40px;background:${c.light};color:${c.text};font-size:15px">${u.name[0]}</div><div><div style="font-size:14px;font-weight:700;color:var(--txt)">${u.name}</div><div style="font-size:11px;color:var(--muted)">${u.role}</div></div></button>`;}).join("")}
      <button type="button" onclick="loginStep='email';renderLogin()" style="width:100%;margin-top:8px;padding:11px;border-radius:12px;border:1.5px solid var(--border);background:#fff;color:var(--muted);font-size:13px;font-weight:600;font-family:inherit;cursor:pointer">← メールアドレスで試す</button>
    </div>
  </div>`;}
function demoLogin(email){CU=USERS.find(u=>u.email===email);TAB=CU.role==="Admin"?"dashboard":"home";loginStep="email";render();}
